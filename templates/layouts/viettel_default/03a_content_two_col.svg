<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="5" fill="#EE0033"/>
  <image href="../images/viettel-logo.png" x="1088" y="28" width="128" height="42" preserveAspectRatio="xMidYMid meet"/>

  <rect x="64" y="38" width="7" height="38" rx="3.5" fill="#EE0033"/>
  <text x="88" y="66" data-box="88,36,960,58" data-wrap="true" font-family="&quot;FS PF BeauSans Pro&quot;, &quot;FS Magistral&quot;, Sarabun" font-size="32" font-weight="800" fill="#000000">{{PAGE_TITLE}}</text>
  <line x1="64" y1="102" x2="1216" y2="102" stroke="#E6E6E6" stroke-width="1"/>

  <!-- Left Column -->
  <rect x="72" y="132" width="540" height="486" rx="6" fill="#FFFFFF" stroke="#E6E6E6" stroke-width="1" stroke-dasharray="6 6"/>
  <text x="342" y="382" text-anchor="middle" font-family="&quot;FS PF BeauSans Pro&quot;, &quot;FS Magistral&quot;, Sarabun" font-size="18" fill="#999999">{{LEFT_CONTENT}}</text>

  <!-- Right Column -->
  <rect x="668" y="132" width="540" height="486" rx="6" fill="#FFFFFF" stroke="#E6E6E6" stroke-width="1" stroke-dasharray="6 6"/>
  <text x="938" y="382" text-anchor="middle" font-family="&quot;FS PF BeauSans Pro&quot;, &quot;FS Magistral&quot;, Sarabun" font-size="18" fill="#999999">{{RIGHT_CONTENT}}</text>

  <!-- Center Divider -->
  <line x1="628" y1="180" x2="628" y2="582" stroke="#E6E6E6" stroke-width="1" stroke-dasharray="4 4"/>

  <rect x="0" y="674" width="1280" height="46" fill="#F2F2F2"/>
