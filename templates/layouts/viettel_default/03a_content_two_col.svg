  <text x="64" y="703" font-family="&quot;FS PF BeauSans Pro&quot;, &quot;FS Magistral&quot;, Sarabun" font-size="13" font-weight="600" fill="#44494D">{{SECTION_NAME}}</text>
  <text x="640" y="703" text-anchor="middle" font-family="&quot;FS PF BeauSans Pro&quot;, &quot;FS Magistral&quot;, Sarabun" font-size="12" fill="#44494D">{{SOURCE}}</text>
  <rect x="1174" y="684" width="42" height="26" rx="4" fill="#EE0033"/>
  <text x="1195" y="703" text-anchor="middle" font-family="&quot;FS PF BeauSans Pro&quot;, &quot;FS Magistral&quot;, Sarabun" font-size="14" font-weight="800" fill="#FFFFFF">{{PAGE_NUM}}</text>
