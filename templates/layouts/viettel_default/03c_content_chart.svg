<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="5" fill="#EE0033"/>
  <image href="../images/viettel-logo.png" x="1088" y="28" width="128" height="42" preserveAspectRatio="xMidYMid meet"/>

  <rect x="64" y="38" width="7" height="38" rx="3.5" fill="#EE0033"/>
  <text x="88" y="66" data-box="88,36,960,58" data-wrap="true" font-family="&quot;FS Magistral&quot;" font-size="32" font-weight="700" fill="#000000">{{PAGE_TITLE}}</text>
  <line x1="64" y1="102" x2="1216" y2="102" stroke="#E6E6E6" stroke-width="1"/>

  <!-- Chart Area (Large, Left) -->
  <rect x="72" y="132" width="760" height="486" rx="6" fill="#FFFFFF" stroke="#E6E6E6" stroke-width="1" stroke-dasharray="6 6"/>
  <text x="452" y="390" text-anchor="middle" font-family="&quot;FS Magistral&quot;" font-size="18" fill="#999999">{{CHART_AREA}}</text>

  <!-- Insights Panel (Right) -->
  <rect x="872" y="132" width="336" height="486" rx="6" fill="#F2F2F2" stroke="#E6E6E6" stroke-width="1"/>
  <text x="1040" y="165" text-anchor="middle" font-family="&quot;FS Magistral&quot;" font-size="14" font-weight="700" fill="#EE0033">KEY INSIGHTS</text>
  <line x1="892" y1="180" x2="1188" y2="180" stroke="#E6E6E6" stroke-width="1"/>

  <!-- Insight Items -->
  <g id="insight-1" transform="translate(892, 200)">
    <circle cx="10" cy="10" r="8" fill="#EE0033"/>
    <text x="28" y="15" font-family="&quot;FS Magistral&quot;" font-size="13" fill="#000000">{{INSIGHT_1}}</text>
  </g>
  <g id="insight-2" data-viettel-blue-scope="icon" transform="translate(892, 260)">
    <circle cx="10" cy="10" r="8" fill="#12436D"/>
    <text x="28" y="15" font-family="&quot;FS Magistral&quot;" font-size="13" fill="#000000">{{INSIGHT_2}}</text>
  </g>
  <g id="insight-3" transform="translate(892, 320)">
    <circle cx="10" cy="10" r="8" fill="#28A197"/>
    <text x="28" y="15" font-family="&quot;FS Magistral&quot;" font-size="13" fill="#000000">{{INSIGHT_3}}</text>
  </g>
  <g id="insight-4" transform="translate(892, 380)">
    <circle cx="10" cy="10" r="8" fill="#F46A25"/>
    <text x="28" y="15" font-family="&quot;FS Magistral&quot;" font-size="13" fill="#000000">{{INSIGHT_4}}</text>
  </g>

  <rect x="0" y="674" width="1280" height="46" fill="#F2F2F2"/>
  <rect x="0" y="674" width="8" height="46" fill="#EE0033"/>
  <text x="64" y="703" font-family="&quot;FS Magistral&quot;" font-size="13" font-weight="500" fill="#44494D">{{SECTION_NAME}}</text>
  <text x="640" y="703" text-anchor="middle" font-family="&quot;FS Magistral&quot;" font-size="12" fill="#44494D">{{SOURCE}}</text>
  <rect x="1174" y="684" width="42" height="26" rx="4" fill="#EE0033"/>
  <text x="1195" y="703" text-anchor="middle" font-family="&quot;FS Magistral&quot;" font-size="14" font-weight="700" fill="#FFFFFF">{{PAGE_NUM}}</text>
</svg>
